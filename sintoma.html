<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrar Síntomas - Disautonomía</title>
    <link rel="stylesheet" href="sintoma.css">
</head>
<body>

<div class="phone-container">
    <div class="header">
        <a href="crear_cuenta.html" class="back-btn" style="text-decoration: none; color: inherit; line-height: 1;">←</a>
        <h1>Registrar síntomas</h1>
    </div>
    <p class="subtitle">Cuéntanos cómo te sientes</p>

    <div class="date-selector">
        <span>‹</span>
        <span id="fecha-actual">Hoy, 8 de junio</span>
        <span>›</span>
    </div>

    <div class="section-card">
        <div class="section-title">Nivel de síntomas</div>
        <div class="mood-container">
            <div class="mood-option" onclick="seleccionarNivel('Nada', this)">
                <div class="mood-icon">🙂</div>
                <span>Nada</span>
            </div>
            <div class="mood-option" onclick="seleccionarNivel('Leve', this)">
                <div class="mood-icon">😊</div>
                <span>Leve</span>
            </div>
            <div class="mood-option" onclick="seleccionarNivel('Moderado', this)">
                <div class="mood-icon">😐</div>
                <span>Moderado</span>
            </div>
            <div class="mood-option" onclick="seleccionarNivel('Severo', this)">
                <div class="mood-icon">🙁</div>
                <span>Severo</span>
            </div>
            <div class="mood-option" onclick="seleccionarNivel('Extremo', this)">
                <div class="mood-icon">😫</div>
                <span>Extremo</span>
            </div>
        </div>
    </div>

    <div class="section-card">
        <div class="section-title">Síntomas principales</div>
        <div class="symptoms-grid">
            <div class="symptom-chip" onclick="toggleSintoma('Mareo', this)">Mareo</div>
            <div class="symptom-chip" onclick="toggleSintoma('Fatiga', this)">Fatiga</div>
            <div class="symptom-chip" onclick="toggleSintoma('Náuseas', this)">Náuseas</div>
            <div class="symptom-chip" onclick="toggleSintoma('Palpitaciones', this)">Palpitaciones</div>
            <div class="symptom-chip" onclick="toggleSintoma('Niebla mental', this)">Niebla mental</div>
            <div class="symptom-chip" onclick="toggleSintoma('Dolor de cabeza', this)">Dolor de cabeza</div>
            <div class="symptom-chip" onclick="toggleSintoma('Intolerancia al calor', this)">Intolerancia al calor</div>
        </div>
    </div>

    <div class="section-card">
        <div class="section-title">Notas adicionales</div>
        <textarea class="notes-area" id="notas" placeholder="Escribe aquí cómo te sentiste..."></textarea>
    </div>

    <button class="btn-guardar" onclick="enviarRegistro()">Guardar registro</button>
</div>

<script src="sintoma.js"></script>
</body>
</html>
