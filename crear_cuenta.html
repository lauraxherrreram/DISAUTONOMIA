<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crear Cuenta</title>
    <link rel="stylesheet" href="crear_cuenta.css">
</head>

<body>

<div class="phone">
    <div class="card">

        <h2>Crear Cuenta</h2>
        <p>Es rápido y fácil</p>

        <input type="text" id="nombre" class="input-registro" placeholder="Nombre completo">

        <input type="email" id="correo" class="input-registro" placeholder="Correo electrónico">

        <input type="text" id="chip" class="input-registro" placeholder="Número del chip">

        <input type="password" id="password" class="input-registro" placeholder="Contraseña">

        <input type="password" id="confirmar" class="input-registro" placeholder="Confirmar contraseña">

        <div class="terminos">
            <input type="checkbox" id="terminos">
            <label>Acepto los términos y condiciones</label>
        </div>

        <button class="guardar" onclick="registrar()">
            Registrarme
        </button>

    </div>
</div>

<script src="crear_cuenta.js"></script>

</body>
</html>
