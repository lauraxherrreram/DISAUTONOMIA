<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Presión Arterial</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>

<div class="phone">

    <div class="header">
        <span class="back">←</span>
        <h1>Presión arterial</h1>
    </div>

    <div class="tabs">
        <button class="active">Registro</button>
        <button>Historial</button>
    </div>

    <div class="fecha">
        Hoy, 06 de mayo
    </div>

    <div class="card">

        <div class="fecha-registro">
            <span>06 de mayo, 2024</span>
            <span>8:30 AM</span>
        </div>

        <div class="presion-box">
            <h2>98/63  mmHg</h2>
            <span>💗 Baja</span>
        </div>

        

        <h3>Síntomas asociados</h3>

        <div class="chips">
            <span>Mareo</span>
            <span>Fatiga</span>
            <span>Náuseas</span>
            <span>Palpitaciones</span>
            <span>Niebla mental</span>
            <span>Dolor de cabeza</span>
            <span>Intolerancia al calor</span>
        </div>

        <h3>Notas adicionales</h3>

        <textarea>Me sentí un poco mareada al levantarme.</textarea>

        <button class="guardar">Guardar</button>

    </div>

    <div class="bottom-nav">
        <div class="nav-item active">
            🏠
            <span>Inicio</span>
        </div>

        <div class="nav-item">
            📝
            <span>Registro</span>
        </div>

        <div class="nav-item">
            📖
            <span>Aprender</span>
        </div>

        <div class="nav-item">
            👥
            <span>Comunidad</span>
        </div>

        <div class="nav-item">
            👤
            <span>Perfil</span>
        </div>
    </div>

</div>

</body>
</html>
