<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Presión Arterial</title>
    <link rel="stylesheet" href="Presion.css">
</head>
<body>

<div class="phone">

    <div class="header">
        <span class="back" onclick="window.location.href='sintoma.html'">←</span>
        <h1>Presión arterial</h1>
    </div>

    <div class="tabs">
        <button class="active">
            Registro
        </button>

        <button onclick="window.location.href='historial.html'">
            Historial
        </button>
    </div>

    <div class="fecha" id="fecha-actual"></div>

    <div class="card">

        <div class="presion-box">

            <input
                type="text"
                id="presion"
                placeholder="Ej: 120/80 mmHg"
                style="
                    width:100%;
                    text-align:center;
                    font-size:28px;
                    font-weight:bold;
                    border:none;
                    outline:none;
                    background:transparent;
                    padding:15px;
                "
            >

        </div>

        <h3>Síntomas asociados</h3>

        <!-- Aquí aparecerán los síntomas -->

        <br>

        <h3>Notas adicionales</h3>

        <textarea
            placeholder="Escribe aquí tus observaciones..."
            rows="4"
            style="width:100%;"
        ></textarea>

        <br><br>

        <button class="guardar" onclick="guardarPresion()">
            Guardar
        </button>

    </div>

</div>

<script src="Presion.js"></script>

</body>
</html>
